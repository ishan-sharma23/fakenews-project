version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fakenews-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=fakenews
    networks:
      - fakenews-network

  # Python ML Service
  ml-service:
    build:
      context: ./fakenews-ml
      dockerfile: Dockerfile
    container_name: fakenews-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/model/saved_model
    volumes:
      - ml_models:/app/model/saved_model
    networks:
      - fakenews-network

  # Node.js Backend
  backend:
    build:
      context: ./fakenews-backend
      dockerfile: Dockerfile
    container_name: fakenews-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/fakenews
      - JWT_SECRET=your_jwt_secret_key_change_in_production
      - ML_SERVICE_URL=http://ml-service:5001
    depends_on:
      - mongodb
      - ml-service
    networks:
      - fakenews-network

  # React Frontend
  frontend:
    build:
      context: ./fakenews-frontend
      dockerfile: Dockerfile
    container_name: fakenews-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fakenews-network

networks:
  fakenews-network:
    driver: bridge

volumes:
  mongodb_data:
  ml_models:
