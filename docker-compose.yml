# Fake News Detection — docker-compose
# Before running: copy .env.example to .env and fill in NEWSAPI_KEY
# Free NewsAPI key: https://newsapi.org/register (100 req/day free tier)
services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fakenews-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=capstoneproject
    networks:
      - fakenews-network

  # Python ML Service
  ml-service:
    build:
      context: ./fakenews-ml
      dockerfile: Dockerfile
    container_name: fakenews-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - MODEL_PATH=/app/model/runtime_models
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ml_models:/app/model/runtime_models
    networks:
      - fakenews-network

  # Node.js Backend
  backend:
    build:
      context: ./fakenews-backend
      dockerfile: Dockerfile
    container_name: fakenews-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${BACKEND_MONGO_URI:-mongodb://mongodb:27017/capstoneproject}
      - JWT_SECRET=3f94c7b1a6e2d8f04b9c5e17a2d3f8b6c1e9a4d7f0b2c6e8a5d1f3b7c9e4a2d6
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - ML_SERVICE_URL=http://ml-service:5001
      - NEWS_API_KEY=${NEWSAPI_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      ml-service:
        condition: service_healthy
    networks:
      - fakenews-network

  # React Frontend
  frontend:
    build:
      context: ./fakenews-frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000/api}
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    container_name: fakenews-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fakenews-network

networks:
  fakenews-network:
    driver: bridge

volumes:
  mongodb_data:
  ml_models:
